<!DOCTYPE html>
<html>
<head>
    <title>Background Image</title>
    <style>
        body{
            margin:0;
            height: 250vh;
            position: relative;
            
        }
        #example1{
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%)rotate(15deg);
            height: 600px;
            width: 600px;
            background-image:url("img2.jpg");
            background-size:contain;
            background-repeat: no-repeat; 
        
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id ="example1">
    <p>The background-image property</p>
    <p>enhances the visual appearance of web pages by allowing images</p>
    <P> to be used as backgrounds with control over</P>
    <p>position, size, repetition, and scrolling behavior.</p>
</div>
</body>
</html>
