<html>
<head>
<title>Factorial</title>
<script>
function factorial(){
let n = parseInt(document.getElementById("num").value);
let fact = 1;

for(let i=1;i<=n;i++){
fact = fact*i;
}

document.getElementById("result").innerHTML =
"Factorial of "+n+" = "+fact;
}
</script>
</head>

<body>

<h2>Factorial Program</h2>

Enter Number :
<input type="text" id="num">

<br><br>

<button onclick="factorial()">Factorial</button>

<p id="result"></p>

</body>
</html>
