<!DOCTYPE html>
<html>
    <head>
        <title>
            CSS FONT TEXT
        </title>
        <style>
            .box{
                font-size: 40px;
            }
            .book{
                font-weight: bold;
            }
            .vehicle{
                font-style: italic;
            }
            .demo{
                text-decoration: underline;
            }
            .example{
                text-transform: capitalize;
            }
            .simple{
                text-align: center;
            }
        </style>
    </head>
    <body>
        <p class="box">This style shows the font size</p>
        <p class="book">This style shows the font weight</p>
        <p class="vehicle">This is the font style</p>
        <p class="demo">This is the text decoration</p>
        <p class="example">This is the text transformation</p>
        <p class="simple">This is the text alignment</p>
    </body>
</html>
