<html>
<head>
<title>Prime Numbers</title>
<script>
function prime(){
let n = parseInt(document.getElementById("num").value);
let output="Prime Numbers : ";

for(let i=2;i<=n;i++){
let flag=1;

for(let j=2;j<i;j++){
if(i%j==0){
flag=0;
break;
}
}

if(flag==1){
output += i+" ";
}
}

document.getElementById("result").innerHTML = output;
}
</script>
</head>

<body>

<h2>Prime Number Program</h2>

Enter Number :
<input type="text" id="num">

<br><br>

<button onclick="prime()">Prime</button>

<p id="result"></p>

</body>
</html>
