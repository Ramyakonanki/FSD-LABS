<!DOCTYPE html>
<html>
    <head>
        <title>Different Colors Of CSS</title>
        <style>
            .color-name{
                color: rgb(234, 4, 4);
            }
            .RGBA-color{
                color:rgba(207, 64, 64, 0.3);
            }
            .HSLA-color{
                color:hsla(300,100%,50%,0.3);
            }
            .HSL-color{
                color: hsl(240, 79%, 45%);
            }
            .RGB-color{
                color:rgb(43, 255, 0);
            }
            .HEX-color{
                color:#ff47c8;
            }
        </style>
    </head>
    <body>
        <h2 class="color-name">This is Red color</h2>
        <h2 class="RGBA-color">This is light brown color</h2>
        <h2 class="HSLA-color">This is a light purple color</h2>
        <h2 class="HSL-color">This is a blue color</h2>
        <h2 class="RGB-color">This is a green color</h2>
        <h2 class="HEX-color">This is a pink color</h2>
    </body>
</html>
